<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>JPDCL Bill Calculator</title>

<link rel="manifest" href="manifest.json">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family: Arial, sans-serif;

    min-height:100vh;

    background:
    linear-gradient(
        135deg,
        #0f2027,
        #203a43,
        #2c5364
    );

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

    overflow:hidden;

    position:relative;
}

.bg-glow{

    position:absolute;

    width:300px;

    height:300px;

    background:
    rgba(0,255,255,0.15);

    border-radius:50%;

    filter:blur(80px);

    top:-100px;

    right:-100px;
}

.container{

    width:100%;

    max-width:500px;

    background:
    rgba(255,255,255,0.12);

    backdrop-filter: blur(18px);

    border:
    1px solid rgba(255,255,255,0.15);

    border-radius:24px;

    padding:25px;

    box-shadow:
    0 8px 32px rgba(0,0,0,0.35);

    z-index:2;
}

.title{

    text-align:center;

    color:white;

    font-size:30px;

    margin-bottom:8px;
}

.subtitle{

    text-align:center;

    color:#dbeafe;

    margin-bottom:25px;

    font-size:14px;
}

.input-box{

    margin-bottom:18px;
}

label{

    display:block;

    color:white;

    margin-bottom:10px;

    font-size:16px;
}

input{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    font-size:18px;

    background:#f8fafc;

    outline:none;

    transition:0.3s;
}

input:focus{

    box-shadow:
    0 0 10px rgba(59,130,246,0.5);
}

.small-note{

    color:#dbeafe;

    font-size:12px;

    margin-top:6px;
}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:
    linear-gradient(
        135deg,
        #00c6ff,
        #0072ff
    );

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 0 15px rgba(59,130,246,0.4);
}

button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 20px rgba(59,130,246,0.4);
}

.result-card{

    margin-top:25px;

    background:white;

    border-radius:16px;

    padding:18px;

    animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

table{

    width:100%;

    border-collapse:collapse;
}

th{

    background:#2563eb;

    color:white;

    padding:12px;

    font-size:15px;
}

td{

    padding:12px;

    text-align:center;

    border-bottom:1px solid #ddd;

    font-size:15px;
}

tr:nth-child(even){

    background:#f8fafc;
}

.total{

    margin-top:20px;

    padding:18px;

    border-radius:14px;

    text-align:center;

    background:
    linear-gradient(
        135deg,
        #11998e,
        #38ef7d
    );

    color:white;

    font-size:28px;

    font-weight:bold;

    box-shadow:
    0 8px 20px rgba(16,185,129,0.35);
}

.note{

    margin-top:14px;

    text-align:center;

    color:#64748b;

    font-size:13px;

    line-height:1.7;
}

.footer{

    margin-top:20px;

    text-align:center;
}

.developer{

    color:#dbeafe;

    opacity:0.85;

    line-height:1.7;

    font-size:13px;
}

@media(max-width:480px){

    .title{
        font-size:24px;
    }

    .total{
        font-size:22px;
    }

}

</style>

</head>

<body>

<div class="bg-glow"></div>

<div class="container">

    <div class="title">
        ⚡ JPDCL Bill Calculator
    </div>

    <div class="subtitle">
        Smart Electricity Bill Estimator
    </div>

    <div class="input-box">

        <label>
            Enter Units Consumed
        </label>

        <input
            type="number"
            id="units"
            placeholder="Example: 450"
        >

    </div>

    <div class="input-box">

        <label>
            Sanctioned Load (Optional)
        </label>

        <input
            type="number"
            id="load"
            placeholder="Default 2 kW"
            value="2"
            step="0.5"
        >

        <div class="small-note">
            Default value is 2 kW
        </div>

    </div>

    <button onclick="calculateBill()">
        Calculate Bill
    </button>

    <div id="output"></div>

    <div class="footer">

        <span class="developer">

           Developed by Arun Bhagat — 📞 6005538708

        </span>

    </div>

</div>

<script>

document.getElementById("units")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){
        calculateBill();
    }

});

function calculateBill(){

    if(document.getElementById("units").value.trim() === ""){

        alert("Please enter units");

        return;
    }

    let units =
    parseFloat(
        document.getElementById("units").value
    );

    if(isNaN(units) || units < 0){

        alert("Please enter valid units");

        return;
    }

    let sanctionedLoad =
    parseFloat(
        document.getElementById("load").value
    ) || 2;

    let demandCharge =
    sanctionedLoad * 8;

    let slab1Units = 0;
    let slab2Units = 0;
    let slab3Units = 0;

    let slab1Cost = 0;
    let slab2Cost = 0;
    let slab3Cost = 0;

    slab1Units =
    Math.min(units, 200);

    slab1Cost =
    slab1Units * 2.30;

    if(units > 200){

        slab2Units =
        Math.min(units - 200, 200);

        slab2Cost =
        slab2Units * 4;
    }

    if(units > 400){

        slab3Units =
        units - 400;

        slab3Cost =
        slab3Units * 4.30;
    }

    let total =
    slab1Cost +
    slab2Cost +
    slab3Cost +
    demandCharge;

    document.getElementById("output").innerHTML =

    `

    <div class="result-card">

        <table>

            <tr>
                <th>Slab</th>
                <th>Units</th>
                <th>Rate</th>
                <th>Amount</th>
            </tr>

            <tr>
                <td>0 - 200</td>
                <td>${slab1Units}</td>
                <td>₹2.30</td>
                <td>₹${slab1Cost.toFixed(2)}</td>
            </tr>

            <tr>
                <td>201 - 400</td>
                <td>${slab2Units}</td>
                <td>₹4.00</td>
                <td>₹${slab2Cost.toFixed(2)}</td>
            </tr>

            <tr>
                <td>Above 400</td>
                <td>${slab3Units}</td>
                <td>₹4.30</td>
                <td>₹${slab3Cost.toFixed(2)}</td>
            </tr>

            <tr>
                <td colspan="3">
                    Demand Charges
                </td>
                <td>
                    ₹${demandCharge.toFixed(2)}
                </td>
            </tr>

        </table>

        <div class="total">

            💰 Estimated Bill =
            ₹${total.toLocaleString("en-IN")}

        </div>

        <div class="note">

            Actual bill may vary slightly
            due to arrears or adjustments.

            <br><br>

            This is an unofficial bill
            estimator and is not affiliated
            with JPDCL.

        </div>

    </div>

    `;
}

</script>

</body>

</html>
